databaseChangeLog:
  - changeSet:
      id: 001-create-note-tags-table
      author: martinwitt
      changes:
        - createTable:
            tableName: note_tags
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 002-create-notes-table
      author: martinwitt
      changes:
        - createTable:
            tableName: notes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 003-create-notes-note-tags-junction
      author: martinwitt
      changes:
        - createTable:
            tableName: notes_note_tags
            columns:
              - column:
                  name: note_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: notes_note_tags
            columnNames: note_id,tag_id
            constraintName: pk_notes_note_tags
        - addForeignKeyConstraint:
            baseTableName: notes_note_tags
            baseColumnNames: note_id
            referencedTableName: notes
            referencedColumnNames: id
            constraintName: fk_notes_note_tags_note_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: notes_note_tags
            baseColumnNames: tag_id
            referencedTableName: note_tags
            referencedColumnNames: id
            constraintName: fk_notes_note_tags_tag_id
            onDelete: CASCADE

  - changeSet:
      id: 004-create-indexes
      author: martinwitt
      changes:
        - createIndex:
            tableName: note_tags
            indexName: idx_note_tags_name
            columns:
              - column:
                  name: name
        - createIndex:
            tableName: notes
            indexName: idx_notes_created_at
            columns:
              - column:
                  name: created_at
