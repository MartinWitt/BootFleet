---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: gateway
---
# ClusterRole so the gateway (in its own namespace) can discover services
# across all namespaces and watch pods/endpoints for load balancing.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: api-gateway-discovery
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: api-gateway-discovery
subjects:
  - kind: ServiceAccount
    name: api-gateway
    namespace: gateway
roleRef:
  kind: ClusterRole
  name: api-gateway-discovery
  apiGroup: rbac.authorization.k8s.io
