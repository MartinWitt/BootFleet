spring:
  ai:
    mcp:
      server:
        protocol: stateless
        path: /mcp
server:
  port: 8080
  forward-headers-strategy: framework

logging:
  level:
    org.springframework.ai.mcp: DEBUG
    org.springaicommunity.mcp: DEBUG
    io.github.martinwitt: DEBUG


# Sequential Thinking Configuration
app:
  thinking:
    session:
      timeout-minutes: 30
      cleanup-interval-minutes: 5
    thought:
      max-per-session: 1000
    branch:
      max-per-session: 100

