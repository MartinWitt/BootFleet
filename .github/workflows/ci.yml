name: CI

env:
  HELPER_LIBS: spring-boot-utils,mcp-utils

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]


jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.detect.outputs.full }}
      modules: ${{ steps.detect.outputs.modules }}
      image_modules: ${{ steps.detect.outputs.image_modules }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - id: detect
        name: Detect changed modules
        run: |
          BASE="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "No usable diff base ($BASE) — falling back to a full build."
            echo "no-diff-base" | bash .github/scripts/detect-changed-modules.sh >> "$GITHUB_OUTPUT"
          else
            git diff --name-only "$BASE" "${{ github.sha }}" | bash .github/scripts/detect-changed-modules.sh >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Spotless Check and Verify
        run: |
          if [ "${{ needs.changes.outputs.full }}" = "true" ]; then
            mvn -B spotless:check
            mvn -B verify
          elif [ -n "${{ needs.changes.outputs.modules }}" ]; then
            mvn -B -pl "${{ needs.changes.outputs.modules }}" -am -amd spotless:check
            mvn -B -pl "${{ needs.changes.outputs.modules }}" -am -amd verify
          else
            echo "No affected modules — skipping build."
          fi

  build-images:
    needs: [changes, build-and-test]
    if: needs.changes.outputs.image_modules != '[]'
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changes.outputs.image_modules) }}
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Log in to the Container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: downcase REPO and MODULE
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
          echo "MODULE=${{ matrix.module }}" >>${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Pre-install library modules
        # Install common sibling modules to the runner's local Maven repository so
        # the later `spring-boot:build-image` run for the selected module can resolve them
        # without attempting to build them as images. Avoids publishing artifacts.
        run: mvn -B -DskipTests install -pl ${{ env.HELPER_LIBS }} -am

      - name: Build Native Image
        run: mvn -pl ${{ matrix.module }} -Pnative spring-boot:build-image -Dspring-boot.build-image.imageName=ghcr.io/${REPO}/${MODULE}:latest-${{ matrix.arch }} -Dspring-boot.build-image.publish=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }} -Dspring-boot.build-image.buildCache=cache

  create-manifest:
    needs: [changes, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changes.outputs.image_modules) }}
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: downcase REPO
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Create and Push Multi-Architecture Manifest
        run: |
          docker buildx imagetools create -t ghcr.io/${REPO}/${{ matrix.module }}:latest \
            ghcr.io/${REPO}/${{ matrix.module }}:latest-amd64 \
            ghcr.io/${REPO}/${{ matrix.module }}:latest-arm64
