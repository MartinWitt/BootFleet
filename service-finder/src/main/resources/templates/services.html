<div th:fragment="services">
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
            transition: border-color 0.15s;
        }

        .card:hover { border-color: #3b82f6; }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 8px;
        }

        .service-name {
            font-size: 1rem;
            font-weight: 600;
            color: #f1f5f9;
            word-break: break-all;
        }

        .ns-badge {
            flex-shrink: 0;
            background: #1e40af20;
            color: #93c5fd;
            border: 1px solid #1e40af50;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .urls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .url-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px 12px;
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.875rem;
            word-break: break-all;
            transition: background 0.15s, border-color 0.15s;
        }

        .url-link:hover {
            background: #1e40af20;
            border-color: #3b82f6;
            color: #93c5fd;
        }

        .url-icon {
            flex-shrink: 0;
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }

        .no-urls {
            font-size: 0.8rem;
            color: #475569;
            font-style: italic;
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .favicon-slot {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .svc-favicon {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: #475569;
        }

        .empty-state-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            color: #334155;
        }

        .empty-state h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #94a3b8;
            margin: 0 0 8px;
        }

        .empty-state p {
            font-size: 0.875rem;
            margin: 0;
        }

        .summary {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 16px;
        }
    </style>

    <div th:if="${services.isEmpty()}" class="empty-state">
        <svg class="empty-state-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="3" width="20" height="6" rx="2"/>
            <rect x="2" y="15" width="20" height="6" rx="2"/>
            <line x1="6" y1="6" x2="6.01" y2="6"/>
            <line x1="6" y1="18" x2="6.01" y2="18"/>
        </svg>
        <h2>No services found</h2>
        <p>No Ingress or HTTPRoute objects were discovered in the cluster.<br>Check that the service account has permission to list Ingress resources.</p>
    </div>

    <div th:unless="${services.isEmpty()}">
        <p class="summary" th:text="${services.size()} + ' ingress(es) found'">0 ingresses found</p>
        <div class="grid">
            <div th:each="svc : ${services}" class="card">
                <div class="card-header">
                    <div class="card-header-left">
                        <span class="favicon-slot">
                            <svg class="svc-favicon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                <rect x="2" y="3" width="12" height="4" rx="1.5" stroke="#475569" stroke-width="1.2"/>
                                <circle cx="12" cy="5" r="1" fill="#475569"/>
                                <rect x="2" y="9" width="12" height="4" rx="1.5" stroke="#475569" stroke-width="1.2"/>
                                <circle cx="12" cy="11" r="1" fill="#475569"/>
                            </svg>
                            <img th:if="${!svc.urls().isEmpty()}"
                                 th:src="${svc.urls().get(0) + '/favicon.svg'}"
                                 width="16" height="16" alt="" class="svc-favicon"
                                 style="display:none"
                                 onload="this.style.display=''; this.previousElementSibling.style.display='none'"
                                 onerror="this.src.endsWith('/favicon.svg') ? (this.src = this.src.replace('/favicon.svg', '/favicon.ico')) : this.remove()">
                        </span>
                        <span class="service-name" th:text="${svc.name()}">name</span>
                    </div>
                    <span class="ns-badge" th:text="${svc.namespace()}">namespace</span>
                </div>
                <div class="urls">
                    <div th:if="${svc.urls().isEmpty()}" class="no-urls">No hosts configured</div>
                    <a th:each="url : ${svc.urls()}"
                       th:href="${url}"
                       class="url-link"
                       target="_blank"
                       rel="noopener noreferrer">
                        <svg class="url-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path d="M10.5 1.5H14a.5.5 0 01.5.5v3.5a.5.5 0 01-1 0V2.707L8.354 7.854a.5.5 0 01-.708-.708L12.793 2H10.5a.5.5 0 010-1zM3 5a2 2 0 012-2h3a.5.5 0 010 1H5a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1v-3a.5.5 0 011 0v3a2 2 0 01-2 2H5a2 2 0 01-2-2V5z"/>
                        </svg>
                        <span th:text="${url}">https://example.com</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
