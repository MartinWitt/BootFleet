server:
  port: 8080

spring:
  main:
    web-application-type: servlet
  aop:
    proxy-target-class: true

management:
  metrics:
    distribution:
      percentiles-histogram:
        resourcewatcher.deployment.update: true
        resourcewatcher.statefulset.update: true
        resourcemanager.restart.pods: true
        pods.restart.duration: true
configreloader:
  enabled: true
  enabled-annotation: config-reloader.io/enabled
  dry-run: true
  watch-mode: all  # Use annotation-based watching by default
