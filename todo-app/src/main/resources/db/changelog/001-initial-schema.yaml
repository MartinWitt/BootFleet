databaseChangeLog:
  - changeSet:
      id: 001-create-tags-table
      author: martinwitt
      changes:
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 002-create-todos-table
      author: martinwitt
      changes:
        - createTable:
            tableName: todos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: text
                  type: TEXT
              - column:
                  name: deadline
                  type: TIMESTAMP
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: OPEN
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: INT
                  defaultValue: 0
                  constraints:
                    nullable: false
              - column:
                  name: cron_expression
                  type: VARCHAR(255)

  - changeSet:
      id: 003-create-todo-tags-junction
      author: martinwitt
      changes:
        - createTable:
            tableName: todo_tags
            columns:
              - column:
                  name: todo_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: todo_tags
            columnNames: todo_id,tag_id
            constraintName: pk_todo_tags
        - addForeignKeyConstraint:
            baseTableName: todo_tags
            baseColumnNames: todo_id
            referencedTableName: todos
            referencedColumnNames: id
            constraintName: fk_todo_tags_todo_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: todo_tags
            baseColumnNames: tag_id
            referencedTableName: tags
            referencedColumnNames: id
            constraintName: fk_todo_tags_tag_id
            onDelete: CASCADE

  - changeSet:
      id: 004-create-indexes
      author: martinwitt
      changes:
        - createIndex:
            tableName: todos
            indexName: idx_todos_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: todos
            indexName: idx_todos_deadline
            columns:
              - column:
                  name: deadline
        - createIndex:
            tableName: todos
            indexName: idx_todos_position
            columns:
              - column:
                  name: position
        - createIndex:
            tableName: tags
            indexName: idx_tags_name
            columns:
              - column:
                  name: name

