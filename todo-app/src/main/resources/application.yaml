spring:
  datasource:
    url: jdbc:h2:mem:todoapp;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# Thymeleaf cache off for development
spring.thymeleaf.cache: false

