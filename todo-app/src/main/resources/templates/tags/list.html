<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Tags — TodoApp</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="stylesheet" href="/css/todo.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏷️ Manage Tags</h1>
      <p>Organize your tasks with custom tags</p>
    </header>

    <main>
      <div style="margin-bottom: 32px;">
        <div th:if="${error}" style="padding: 12px 16px; background: var(--danger, #ef4444); color: white; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem;" th:text="${error}"></div>
        <form method="post" action="/tags" class="tag-form">
          <div style="display: grid; grid-template-columns: 1fr auto; gap: 12px;">
            <input type="text" name="name" placeholder="Enter new tag name..." required style="padding: 12px; background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem;"/>
            <button type="submit" class="btn-primary" style="padding: 12px 24px;">+ Create Tag</button>
          </div>
        </form>
      </div>

      <div th:if="${not #lists.isEmpty(tags)}">
        <h2 style="color: var(--text-primary); margin-bottom: 16px; font-size: 1.1rem;">Your Tags</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;">
          <th:block th:each="t : ${tags}">
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg-secondary); border-radius: 10px; transition: background 0.2s ease;" onmouseover="this.style.background='var(--bg-tertiary)'" onmouseout="this.style.background='var(--bg-secondary)'">
              <span style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-primary); font-weight: 500; font-size: 0.95rem;">
                <span th:text="${t.name}"></span>
              </span>
              <form th:action="@{/tags/{id}/delete(id=${t.id})}" method="post" onsubmit="return confirm('Delete this tag?');" style="display: contents;">
                <button type="submit" class="action-btn action-btn--delete" title="Delete tag">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                  </svg>
                </button>
              </form>
            </div>
          </th:block>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(tags)}" style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
        <p style="font-size: 1.1rem; margin-bottom: 20px;">✨ No tags yet — create one to get started!</p>
      </div>

      <div style="margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border);">
        <a href="/todos" class="btn btn-secondary">← Back to Todos</a>
      </div>
    </main>
  </div>
</body>
</html>
