<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${todo.id == null} ? 'New Todo — TodoApp' : 'Edit Todo — TodoApp'"></title>
  <link rel="stylesheet" href="/css/todo.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1 th:text="${todo.id == null} ? 'Create New Todo' : 'Edit Todo'"></h1>
      <p th:text="${todo.id == null} ? 'Add a new task to your list' : 'Update your task details'"></p>
    </header>

    <main>
      <form th:action="${todo.id == null} ? '/todos' : '/todos/' + ${todo.id}" method="post">

        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" name="title" th:value="${todo.title}"
                 placeholder="What needs to be done?" required />
        </div>

        <div class="form-group">
          <label for="text">Description</label>
          <textarea id="text" name="text"
                    placeholder="Add more details..." th:text="${todo.text}"></textarea>
        </div>

        <div class="form-group">
          <label>Deadline</label>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div>
              <label for="deadlineDate" style="font-size: 0.82rem; color: var(--text-muted); font-weight: 400; margin-bottom: 4px;">Date</label>
              <input type="date" id="deadlineDate" name="deadlineDate" th:value="${deadlineDate}" />
            </div>
            <div>
              <label for="deadlineTime" style="font-size: 0.82rem; color: var(--text-muted); font-weight: 400; margin-bottom: 4px;">Time (optional)</label>
              <input type="time" id="deadlineTime" name="deadlineTime" th:value="${deadlineTime}" />
            </div>
          </div>
          <div class="quick-picks" style="margin-top: 8px;">
            <button type="button" class="quick-pick-btn" onclick="setDeadline('today')">Today</button>
            <button type="button" class="quick-pick-btn" onclick="setDeadline('endofmonth')">End of Month</button>
          </div>
        </div>

        <div class="form-group">
          <label>Tags</label>
          <div class="tag-selector">
            <th:block th:each="tag : ${tags}">
              <input type="checkbox" th:id="'tag-' + ${tag.id}" name="tagNames"
                     th:value="${tag.name}" class="tag-checkbox"
                     th:checked="${tagNames.contains(tag.name)}" />
              <label th:for="'tag-' + ${tag.id}" class="tag-label" th:text="${tag.name}"></label>
            </th:block>
          </div>
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <th:block th:each="s : ${statuses}">
              <option th:value="${s}"
                      th:selected="${todo.status != null ? s.name() == todo.status.name() : false}"
                      th:text="${s}"></option>
            </th:block>
          </select>
        </div>

        <!-- Recurrence section -->
        <div class="form-group">
          <label>Recurrence</label>
          <div class="recur-section">

            <!-- Day-of-week picker (0=Sun, 1=Mon … 6=Sat) -->
            <div class="day-picker">
              <label class="day-btn"><input type="checkbox" class="day-check" value="1"><span>Mon</span></label>
              <label class="day-btn"><input type="checkbox" class="day-check" value="2"><span>Tue</span></label>
              <label class="day-btn"><input type="checkbox" class="day-check" value="3"><span>Wed</span></label>
              <label class="day-btn"><input type="checkbox" class="day-check" value="4"><span>Thu</span></label>
              <label class="day-btn"><input type="checkbox" class="day-check" value="5"><span>Fri</span></label>
              <label class="day-btn"><input type="checkbox" class="day-check" value="6"><span>Sat</span></label>
              <label class="day-btn"><input type="checkbox" class="day-check" value="0"><span>Sun</span></label>
            </div>

            <!-- Time for recurring tasks -->
            <div style="display: flex; align-items: center; gap: 10px;">
              <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 400; white-space: nowrap;">at time</label>
              <input type="time" id="recur-time" style="max-width: 140px;" />
            </div>

            <!-- Quick picks -->
            <div class="quick-picks">
              <button type="button" class="quick-pick-btn" onclick="setQuick('weekdays')">Weekdays</button>
              <button type="button" class="quick-pick-btn" onclick="setQuick('weekend')">Weekend</button>
              <button type="button" class="quick-pick-btn" onclick="setQuick('daily')">Daily</button>
              <button type="button" class="quick-pick-btn" onclick="setQuick('clear')">Clear</button>
            </div>

            <!-- Cron expression (auto-generated or manual) -->
            <div class="cron-advanced">
              <label for="cronExpression">Cron expression (auto-generated or custom)</label>
              <input type="text" id="cronExpression" name="cronExpression"
                     th:value="${cronExpression}"
                     placeholder="e.g. 0 9 * * 1,2,3,4,5  (min hour day month weekday)" />
            </div>
          </div>
        </div>

        <div class="form-actions">
          <a href="/todos" class="btn-cancel">Cancel</a>
          <button type="submit" class="btn-primary"
                  th:text="${todo.id == null} ? 'Create Todo' : 'Save Changes'"></button>
        </div>
      </form>

      <script>
        const cronInput = document.getElementById('cronExpression');
        const timeInput = document.getElementById('recur-time');
        const dayChecks = document.querySelectorAll('.day-check');

        function updateCronFromPicker() {
          const checked = [...dayChecks].filter(c => c.checked).map(c => c.value);
          if (checked.length === 0) {
            cronInput.value = '';
            return;
          }
          const parts = (timeInput.value || '0:0').split(':');
          const h = parseInt(parts[0]) || 0;
          const m = parseInt(parts[1]) || 0;
          cronInput.value = `${m} ${h} * * ${checked.join(',')}`;
        }

        function syncPickerFromCron() {
          const val = (cronInput.value || '').trim();
          if (!val) return;
          const parts = val.split(/\s+/);
          if (parts.length < 5) return;
          const [min, hour, , , dow] = parts;
          if (hour !== '*' && min !== '*') {
            const h = String(parseInt(hour) || 0).padStart(2, '0');
            const m = String(parseInt(min) || 0).padStart(2, '0');
            timeInput.value = `${h}:${m}`;
          }
          if (dow && dow !== '*') {
            const selected = new Set();
            dow.split(',').forEach(p => {
              if (p.includes('-')) {
                const [s, e] = p.split('-').map(Number);
                for (let d = s; d <= e; d++) selected.add(String(d));
              } else {
                selected.add(p.trim());
              }
            });
            dayChecks.forEach(c => { c.checked = selected.has(c.value); });
          } else if (dow === '*') {
            dayChecks.forEach(c => { c.checked = true; });
          }
        }

        dayChecks.forEach(c => c.addEventListener('change', updateCronFromPicker));
        timeInput.addEventListener('change', updateCronFromPicker);

        function setQuick(type) {
          const weekday = ['1', '2', '3', '4', '5'];
          const weekend = ['0', '6'];
          if (type === 'weekdays')    dayChecks.forEach(c => { c.checked = weekday.includes(c.value); });
          else if (type === 'weekend') dayChecks.forEach(c => { c.checked = weekend.includes(c.value); });
          else if (type === 'daily')  dayChecks.forEach(c => { c.checked = true; });
          else if (type === 'clear') {
            dayChecks.forEach(c => { c.checked = false; });
            timeInput.value = '';
            cronInput.value = '';
            return;
          }
          updateCronFromPicker();
        }

        function setDeadline(type) {
          const dateInput = document.getElementById('deadlineDate');
          const now = new Date();
          if (type === 'today') {
            dateInput.value = now.toISOString().slice(0, 10);
          } else if (type === 'endofmonth') {
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            dateInput.value = lastDay.toISOString().slice(0, 10);
          }
        }

        document.addEventListener('DOMContentLoaded', syncPickerFromCron);
      </script>
    </main>
  </div>
</body>
</html>
