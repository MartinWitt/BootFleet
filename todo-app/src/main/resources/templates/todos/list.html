<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TodoApp — Manage Your Tasks</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="stylesheet" href="/css/todo.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
  <script src="/js/todo-dnd.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>TodoApp</h1>
      <p>Organize your tasks with style</p>
    </header>

    <main>
      <!-- Controls -->
      <div class="controls">
        <div class="controls-left">
          <a href="/todos/new" class="btn">+ New Todo</a>
          <a href="/tags" class="btn btn-secondary">Manage Tags</a>
        </div>
        <div class="filter">
          <form method="get" action="/todos">
            <select name="tag" onchange="this.form.submit()">
              <option value="">All Tags</option>
              <th:block th:each="t : ${tags}">
                <option th:value="${t.name}" th:text="${t.name}" th:selected="${t.name == selectedTag}"></option>
              </th:block>
            </select>
          </form>
        </div>
      </div>

      <!-- Weekly overview -->
      <section class="week-calendar">
        <h2 class="section-title">This Week</h2>
        <div class="week-grid">
          <th:block th:each="day : ${weekDays}">
            <div class="week-day" th:classappend="${day.isToday} ? 'week-day--today' : ''">
              <div class="week-day-header">
                <span class="week-day-name" th:text="${day.name}"></span>
                <span class="week-day-date" th:text="${day.date}"></span>
              </div>
              <div class="week-day-body">
                <span class="week-day-empty" th:if="${#lists.isEmpty(day.todos)}">—</span>
                <th:block th:each="todo : ${day.todos}">
                  <a th:href="@{/todos/{id}/edit(id=${todo.id})}"
                     class="week-todo-chip"
                     th:classappend="'week-todo-chip--' + ${todo.status.name()}"
                     th:text="${todo.title}"></a>
                </th:block>
              </div>
            </div>
          </th:block>
        </div>
      </section>

      <!-- Todo list -->
      <div id="todo-list" class="todo-list" th:attr="data-reorder-url=@{/todos/reorder}">

        <!-- Empty state -->
        <div class="no-todos"
             th:if="${#lists.isEmpty(recurringTodos) and #lists.isEmpty(oneTimeTodos) and #lists.isEmpty(doneTodos)}">
          <p>No todos yet — create one to get started!</p>
          <a href="/todos/new" class="btn">Create Your First Todo</a>
        </div>

        <!-- Wiederkehrend -->
        <div th:if="${not #lists.isEmpty(recurringTodos)}">
          <h2 class="section-title">Wiederkehrend</h2>
          <ul id="todos-recurring" class="todos">
            <th:block th:each="todo : ${recurringTodos}">
              <li class="todo-row" th:attr="data-id=${todo.id},data-status=${todo.status.name()}">
                <div class="todo-main">
                  <strong th:text="${todo.title}"></strong>
                  <div class="meta">
                    <span class="deadline-display" th:if="${formattedDeadlines.get(todo.id)}"
                          th:text="'📅 ' + ${formattedDeadlines.get(todo.id)}"></span>
                    <span th:if="${cronDescriptions.get(todo.id)}" class="recurring-badge">
                      🔁 <span th:text="${cronDescriptions.get(todo.id)}"></span>
                    </span>
                  </div>
                  <div class="tags" th:if="${not #lists.isEmpty(todo.tags)}">
                    <th:block th:each="tag : ${todo.tags}">
                      <span class="tag" th:text="${tag.name}"></span>
                    </th:block>
                  </div>
                </div>
                <div class="actions">
                  <div class="snooze-wrap" th:attr="data-id=${todo.id}">
                    <button type="button" class="action-btn action-btn--snooze" title="Snooze task">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                      </svg>
                    </button>
                    <div class="snooze-menu">
                      <button type="button" data-days="1">+1 day</button>
                      <button type="button" data-days="3">+3 days</button>
                      <button type="button" data-days="7">+1 week</button>
                      <button type="button" data-days="14">+2 weeks</button>
                    </div>
                  </div>
                  <a th:href="@{/todos/{id}/edit(id=${todo.id})}" class="action-btn action-btn--edit" title="Edit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                  </a>
                  <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post"
                        onsubmit="return confirm('Delete this task?');">
                    <button type="submit" class="action-btn action-btn--delete" title="Delete">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                      </svg>
                    </button>
                  </form>
                  <select class="status-select status-chip"
                          th:attr="data-id=${todo.id}, data-status=${todo.status.name()}">
                    <th:block th:each="s : ${statuses}">
                      <option th:value="${s.name()}"
                              th:selected="${s.name() == todo.status.name()}"
                              th:text="${s}"></option>
                    </th:block>
                  </select>
                </div>
              </li>
            </th:block>
          </ul>
        </div>

        <!-- Einmalig -->
        <div th:if="${not #lists.isEmpty(oneTimeTodos)}">
          <h2 class="section-title">Einmalig</h2>
          <ul id="todos-onetime" class="todos">
            <th:block th:each="todo : ${oneTimeTodos}">
              <li class="todo-row" th:attr="data-id=${todo.id},data-status=${todo.status.name()}">
                <div class="todo-main">
                  <strong th:text="${todo.title}"></strong>
                  <div class="meta">
                    <span class="deadline-display" th:if="${formattedDeadlines.get(todo.id)}"
                          th:text="'📅 ' + ${formattedDeadlines.get(todo.id)}"></span>
                  </div>
                  <div class="tags" th:if="${not #lists.isEmpty(todo.tags)}">
                    <th:block th:each="tag : ${todo.tags}">
                      <span class="tag" th:text="${tag.name}"></span>
                    </th:block>
                  </div>
                </div>
                <div class="actions">
                  <div class="snooze-wrap" th:attr="data-id=${todo.id}">
                    <button type="button" class="action-btn action-btn--snooze" title="Snooze task">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                      </svg>
                    </button>
                    <div class="snooze-menu">
                      <button type="button" data-days="1">+1 day</button>
                      <button type="button" data-days="3">+3 days</button>
                      <button type="button" data-days="7">+1 week</button>
                      <button type="button" data-days="14">+2 weeks</button>
                    </div>
                  </div>
                  <a th:href="@{/todos/{id}/edit(id=${todo.id})}" class="action-btn action-btn--edit" title="Edit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                  </a>
                  <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post"
                        onsubmit="return confirm('Delete this task?');">
                    <button type="submit" class="action-btn action-btn--delete" title="Delete">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                      </svg>
                    </button>
                  </form>
                  <select class="status-select status-chip"
                          th:attr="data-id=${todo.id}, data-status=${todo.status.name()}">
                    <th:block th:each="s : ${statuses}">
                      <option th:value="${s.name()}"
                              th:selected="${s.name() == todo.status.name()}"
                              th:text="${s}"></option>
                    </th:block>
                  </select>
                </div>
              </li>
            </th:block>
          </ul>
        </div>

        <!-- Erledigt (toggle) -->
        <div th:if="${not #lists.isEmpty(doneTodos)}" class="done-section">
          <button type="button" class="done-toggle"
                  onclick="var b=document.getElementById('done-section-body');b.classList.toggle('done-section--visible');this.classList.toggle('done-toggle--open')">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="done-toggle-chevron">
              <path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6z"/>
            </svg>
            Erledigt (<span th:text="${#lists.size(doneTodos)}"></span>)
          </button>
          <div id="done-section-body" class="done-section-body">
            <ul id="todos-done" class="todos">
              <th:block th:each="todo : ${doneTodos}">
                <li class="todo-row" th:attr="data-id=${todo.id},data-status=${todo.status.name()}">
                  <div class="todo-main">
                    <strong th:text="${todo.title}"></strong>
                    <div class="meta">
                      <span class="deadline-display" th:if="${formattedDeadlines.get(todo.id)}"
                            th:text="'📅 ' + ${formattedDeadlines.get(todo.id)}"></span>
                      <span th:if="${cronDescriptions.get(todo.id)}" class="recurring-badge">
                        🔁 <span th:text="${cronDescriptions.get(todo.id)}"></span>
                      </span>
                    </div>
                    <div class="tags" th:if="${not #lists.isEmpty(todo.tags)}">
                      <th:block th:each="tag : ${todo.tags}">
                        <span class="tag" th:text="${tag.name}"></span>
                      </th:block>
                    </div>
                  </div>
                  <div class="actions">
                    <div class="snooze-wrap" th:attr="data-id=${todo.id}">
                      <button type="button" class="action-btn action-btn--snooze" title="Snooze task">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                        </svg>
                      </button>
                      <div class="snooze-menu">
                        <button type="button" data-days="1">+1 day</button>
                        <button type="button" data-days="3">+3 days</button>
                        <button type="button" data-days="7">+1 week</button>
                        <button type="button" data-days="14">+2 weeks</button>
                      </div>
                    </div>
                    <a th:href="@{/todos/{id}/edit(id=${todo.id})}" class="action-btn action-btn--edit" title="Edit">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                      </svg>
                    </a>
                    <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post"
                          onsubmit="return confirm('Delete this task?');">
                      <button type="submit" class="action-btn action-btn--delete" title="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                      </button>
                    </form>
                    <select class="status-select status-chip"
                            th:attr="data-id=${todo.id}, data-status=${todo.status.name()}">
                      <th:block th:each="s : ${statuses}">
                        <option th:value="${s.name()}"
                                th:selected="${s.name() == todo.status.name()}"
                                th:text="${s}"></option>
                      </th:block>
                    </select>
                  </div>
                </li>
              </th:block>
            </ul>
          </div>
        </div>

      </div>
    </main>
  </div>
</body>
</html>
