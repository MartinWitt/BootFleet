spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: 8080
  servlet:
    context-path: /

# Production logging
logging:
  level:
    root: INFO
    io.github.martinwitt: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

